name: Build & Release

on:
  push:
    branches: [ '**' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # app/build.gradle.kts reads GITHUB_RUN_NUMBER for versionCode/versionName.
      # Set it explicitly from this workflow context so CI releases always
      # get monotonically increasing Play Store-safe version codes.
      GITHUB_RUN_NUMBER: ${{ github.run_number }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so softprops/action-gh-release can build release notes.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate AdMob secrets
        if: github.event_name == 'push'
        env:
          ADS_ENABLED: ${{ secrets.ADS_ENABLED }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_APP_OPEN_ID_DEBUG: ${{ secrets.ADMOB_APP_OPEN_ID_DEBUG }}
          ADMOB_APP_OPEN_ID_RELEASE: ${{ secrets.ADMOB_APP_OPEN_ID_RELEASE }}
          ADMOB_BANNER_ID_DEBUG: ${{ secrets.ADMOB_BANNER_ID_DEBUG }}
          ADMOB_BANNER_ID_RELEASE: ${{ secrets.ADMOB_BANNER_ID_RELEASE }}
          ADMOB_NATIVE_ID_DEBUG: ${{ secrets.ADMOB_NATIVE_ID_DEBUG }}
          ADMOB_NATIVE_ID_RELEASE: ${{ secrets.ADMOB_NATIVE_ID_RELEASE }}
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_FILE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for key in ADS_ENABLED ADMOB_APP_ID ADMOB_APP_OPEN_ID_DEBUG ADMOB_APP_OPEN_ID_RELEASE ADMOB_BANNER_ID_DEBUG ADMOB_BANNER_ID_RELEASE ADMOB_NATIVE_ID_DEBUG ADMOB_NATIVE_ID_RELEASE GOOGLE_SERVICES_JSON_B64 ANDROID_KEYSTORE_B64 ANDROID_KEYSTORE_FILE ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!key}" ]]; then
              echo "::error::$key is not set in GitHub repository secrets."
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Generate app/google-services.json from secret
        if: github.event_name == 'push'
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          mkdir -p app
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > app/google-services.json

      - name: Generate signing files from secrets
        if: github.event_name == 'push'
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_FILE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode > "$ANDROID_KEYSTORE_FILE"
          cat > keystore.properties <<EOF
          storeFile=$ANDROID_KEYSTORE_FILE
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Generate CI local.properties (ads enabled)
        if: github.event_name == 'push'
        env:
          ADS_ENABLED: ${{ secrets.ADS_ENABLED }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_APP_OPEN_ID_DEBUG: ${{ secrets.ADMOB_APP_OPEN_ID_DEBUG }}
          ADMOB_APP_OPEN_ID_RELEASE: ${{ secrets.ADMOB_APP_OPEN_ID_RELEASE }}
          ADMOB_BANNER_ID_DEBUG: ${{ secrets.ADMOB_BANNER_ID_DEBUG }}
          ADMOB_BANNER_ID_RELEASE: ${{ secrets.ADMOB_BANNER_ID_RELEASE }}
          ADMOB_NATIVE_ID_DEBUG: ${{ secrets.ADMOB_NATIVE_ID_DEBUG }}
          ADMOB_NATIVE_ID_RELEASE: ${{ secrets.ADMOB_NATIVE_ID_RELEASE }}
        run: |
          cat > local.properties <<EOF
          translate.url=http://localhost:3006
          stt.url=http://localhost:9000/asr?output=json
          ads.enabled=${ADS_ENABLED:-true}
          ads.admob.app.id=$ADMOB_APP_ID
          ads.admob.app.open.id.debug=$ADMOB_APP_OPEN_ID_DEBUG
          ads.admob.app.open.id.release=$ADMOB_APP_OPEN_ID_RELEASE
          ads.admob.banner.id.debug=$ADMOB_BANNER_ID_DEBUG
          ads.admob.banner.id.release=$ADMOB_BANNER_ID_RELEASE
          ads.admob.native.id.debug=$ADMOB_NATIVE_ID_DEBUG
          ads.admob.native.id.release=$ADMOB_NATIVE_ID_RELEASE
          EOF

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Build release App Bundle (AAB)
        run: ./gradlew bundleRelease

      # Compute a tag name for release filenames and GitHub release publishing.
      - name: Compute release tag
        id: tag
        if: github.event_name == 'push'
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "name=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release files with live-caption names
        if: github.event_name == 'push'
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          APK_SRC="app/build/outputs/apk/release/app-release.apk"
          AAB_SRC="app/build/outputs/bundle/release/app-release.aab"
          test -f "$APK_SRC"
          test -f "$AAB_SRC"
          cp "$APK_SRC" "app/build/outputs/apk/release/live-caption-${TAG}.apk"
          cp "$AAB_SRC" "app/build/outputs/bundle/release/live-caption-${TAG}.aab"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: live-caption-release-apk
          path: app/build/outputs/apk/release/live-caption-${{ steps.tag.outputs.name }}.apk

      - name: Upload release AAB
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: live-caption-release-aab
          path: app/build/outputs/bundle/release/live-caption-${{ steps.tag.outputs.name }}.aab

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: LiveCaptionN ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/live-caption-${{ steps.tag.outputs.name }}.apk
            app/build/outputs/bundle/release/live-caption-${{ steps.tag.outputs.name }}.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
